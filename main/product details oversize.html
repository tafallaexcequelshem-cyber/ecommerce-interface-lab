<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Oversized Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><a href="products.html">← Back to Products</a></header>
  <main>
    <h1 id="title">Oversized Shirt</h1>
    <p id="displayPrice" style="font-size: 1.5rem; font-weight: bold; color: #222;"></p>

    <table>
      <caption>Product Specifications</caption>
      <tr><th>Material:</th><td>100% Premium Cotton (220 GSM)</td></tr>
      <tr><th>Fit:</th><td>Oversized / Relaxed Fit</td></tr>
      <tr><th>Print:</th><td>High-Quality Silk Screen</td></tr>
    </table>

    <form>
      <label for="size">Size:</label>
      <select id="size"><option>Small</option><option>Medium</option><option>Large</option><option>XL</option></select>
      <label for="qty">Quantity:</label>
      <input type="number" id="qty" value="1" min="1" style="width: 60px;">
      <button type="submit">Add to Cart</button>
    </form>
  </main>

 
</body>
</html>
