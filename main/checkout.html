<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - Clothing Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Checkout</h1>
  <nav>
    <ul>
      <li><a href="landing.html">Home</a></li>
      <li><a href="products.html">Shop</a></li>
      <li><a href="cart.html">Cart</a></li>
    </ul>
  </nav>
</header>

<main class="checkout">
  <form id="checkout-form">
    <section>
      <h2>Shipping Information</h2>
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input id="fullname" type="text" name="fullname" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="street">Street Address</label>
        <input id="street" type="text" name="street" required>
      </div>

      <div class="form-group">
        <label for="city">City</label>
        <input id="city" type="text" name="city" required>
      </div>

      <div class="form-group">
        <label for="zipcode">ZIP Code</label>
        <input id="zipcode" type="text" name="zipcode" required>
      </div>
    </section>

    <section>
      <h2>Payment Method</h2>
      <div class="payment-options">
        <label><input type="radio" name="payment" value="credit-card" required> Credit Card</label>
        <label><input type="radio" name="payment" value="paypal" required> PayPal</label>
      </div>
    </section>

    <section class="summary">
      <h2>Order Summary</h2>

      <ul class="summary-list">
        <li>One Piece - Oversized Tee x 1 <span class="item-price">₱600</span></li>
        <li>Upseen - Standard Tee x 2 <span class="item-price">₱800</span></li>
      </ul>

      <div class="summary-total-row">
        <span>Subtotal:</span>
        <span class="total-amount">₱1,400</span>
      </div>

      <button type="submit" class="checkout-btn">Place Order</button>
    </section>
  </form>
</main>

<script src="script.js"></script>
</body>
</html>
