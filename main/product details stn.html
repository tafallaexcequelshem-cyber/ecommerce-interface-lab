<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Standard Fit Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><a href="products.html">← Back to Products</a></header>
  <main>
    <h1 id="title">Standard Tee</h1>
    <p id="displayPrice" style="font-size: 1.5rem; font-weight: bold; color: #222;"></p>

    <table>
      <caption>Product Specifications</caption>
      <tr><th>Material:</th><td>100% Combed Cotton (180 GSM)</td></tr>
      <tr><th>Fit:</th><td>Standard / Regular Fit</td></tr>
      <tr><th>Print:</th><td>Direct-to-Film (DTF)</td></tr>
    </table>

    <form>
      <label for="size">Size:</label>
      <select id="size"><option>XS</option><option>Small</option><option>Medium</option><option>Large</option></select>
      <label for="qty">Quantity:</label>
      <input type="number" id="qty" value="1" min="1" style="width: 60px;">
      <button type="submit">Add to Cart</button>
    </form>
  </main>

</body>
</html>
